name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的已有标签（须为 v* 且已存在于仓库）'
        required: true
        type: string

env:
  PYTHON_VERSION: '3.12'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

jobs:
  check-tagname:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate tag version
        run: python tools/check_tag.py ${{ env.RELEASE_TAG }}

  sync:
    runs-on: ubuntu-latest
    needs: [check-tagname]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "Github Action"
          git config --global user.email "action@github.com"

      - name: Add Gitee remote
        run: |
          git remote add gitee https://flyingcys:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_REPO }}.git

      - name: Push tags to Gitee
        run: git push gitee --tags --force

  build-linux:
    runs-on: ubuntu-latest
    needs: [check-tagname]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make build script executable
        run: chmod +x ./tools/build_package.sh

      - name: Build package
        run: ./tools/build_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/linux_tyutool_cli.tar.gz
            dist/linux_tyutool_gui.tar.gz

  build-macos:
    needs: [check-tagname]
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: x86
            runner: ${{ vars.MACOS_INTEL_RUNNER || 'macos-15-intel' }}
            artifact: macos-x86-artifacts
            dist: |
              dist/darwin_x86_tyutool_cli.tar.gz
              dist/darwin_x86_tyutool_gui.tar.gz
          - id: arm
            runner: macos-latest
            artifact: macos-arm-artifacts
            dist: |
              dist/darwin_arm64_tyutool_cli.tar.gz
              dist/darwin_arm64_tyutool_gui.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make build script executable
        run: chmod +x ./tools/build_package.sh

      - name: Build package
        run: ./tools/build_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist }}

  build-windows:
    runs-on: windows-latest
    needs: [check-tagname]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build package
        run: .\tools\build_package.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/windows_tyutool_cli.zip
            dist/windows_tyutool_gui.zip

  release:
    runs-on: ubuntu-latest
    needs: [sync, build-linux, build-macos, build-windows]
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            artifacts/linux-artifacts/*
            artifacts/macos-x86-artifacts/*
            artifacts/macos-arm-artifacts/*
            artifacts/windows-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-release-to-gitee:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Gitee release and upload assets
        run: |
          RELEASE_INFO=$(curl -X POST \
            "https://gitee.com/api/v5/repos/${{ secrets.GITEE_REPO }}/releases" \
            -H 'Content-Type: application/json' \
            -H 'Authorization: token ${{ secrets.GITEE_TOKEN }}' \
            -d '{
              "tag_name": "${{ env.RELEASE_TAG }}",
              "target_commitish": "master",
              "name": "Release ${{ env.RELEASE_TAG }}",
              "body": "${{ env.RELEASE_TAG }}",
              "draft": false,
              "prerelease": false
            }')
          RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id')
          find artifacts -type f | while read -r file_path; do
            echo "| $file_path"
            curl -X POST \
              "https://gitee.com/api/v5/repos/${{ secrets.GITEE_REPO }}/releases/${RELEASE_ID}/attach_files" \
              -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
              -F "file=@$file_path"
          done
