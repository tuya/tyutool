name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, or leave empty for build-only (no sync/releases).'
        required: false
        default: ''
        type: string

env:
  PYTHON_VERSION: '3.12'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

jobs:
  check-tagname:
    name: Validate tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Match version with tag
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
        run: python tools/check_tag.py ${{ env.RELEASE_TAG }}

  sync:
    name: Mirror tags to Gitee
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    runs-on: ubuntu-latest
    needs: [check-tagname]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "Github Action"
          git config --global user.email "action@github.com"

      - name: Add Gitee remote
        run: |
          git remote add gitee https://flyingcys:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_REPO }}.git

      - name: Push tags to Gitee
        run: git push gitee --tags --force

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [check-tagname]
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make build script executable
        run: chmod +x ./tools/build_package.sh

      - name: Build package
        run: ./tools/build_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          if-no-files-found: error
          path: |
            dist/linux_tyutool_cli.tar.gz
            dist/linux_tyutool_gui.tar.gz

  build-macos:
    needs: [check-tagname]
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: x86
            runner: ${{ vars.MACOS_INTEL_RUNNER || 'macos-15-intel' }}
            artifact: macos-x86-artifacts
            dist: |
              dist/darwin_x86_tyutool_cli.tar.gz
              dist/darwin_x86_tyutool_gui.tar.gz
          - id: arm
            runner: macos-latest
            artifact: macos-arm-artifacts
            dist: |
              dist/darwin_arm64_tyutool_cli.tar.gz
              dist/darwin_arm64_tyutool_gui.tar.gz
    runs-on: ${{ matrix.runner }}
    name: Build macOS (${{ matrix.id }})
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make build script executable
        run: chmod +x ./tools/build_package.sh

      - name: Build package
        run: ./tools/build_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.dist }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [check-tagname]
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build package
        run: .\tools\build_package.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          if-no-files-found: error
          path: |
            dist/windows_tyutool_cli.zip
            dist/windows_tyutool_gui.zip

  release:
    name: Publish GitHub Release
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    runs-on: ubuntu-latest
    needs: [sync, build-linux, build-macos, build-windows]
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            artifacts/linux-artifacts/*
            artifacts/macos-x86-artifacts/*
            artifacts/macos-arm-artifacts/*
            artifacts/windows-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-release-to-gitee:
    name: Publish Gitee Release
    runs-on: ubuntu-latest
    needs: [release]
    timeout-minutes: 30
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Gitee release and upload assets
        env:
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          # Gitee standard repos: Release attachment max 100MiB per file (see Gitee help). Skip oversize assets; GitHub Release has the full set.
          GITEE_MAX_BYTES=$((100 * 1024 * 1024))
          RELEASE_INFO=$(curl -sfS -X POST \
            "https://gitee.com/api/v5/repos/${GITEE_REPO}/releases" \
            -H 'Content-Type: application/json' \
            -H "Authorization: token ${GITEE_TOKEN}" \
            -d "$(jq -n \
              --arg tag "${RELEASE_TAG}" \
              '{tag_name: $tag, target_commitish: "master", name: ("Release " + $tag), body: $tag, draft: false, prerelease: false}')")
          RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id')
          if [[ -z "$RELEASE_ID" || "$RELEASE_ID" == "null" ]]; then
            echo "::error::Gitee create release failed: ${RELEASE_INFO}"
            exit 1
          fi
          while IFS= read -r -d '' file_path; do
            file_size=$(stat -c '%s' "$file_path")
            if [[ "${file_size}" -gt "${GITEE_MAX_BYTES}" ]]; then
              echo "::warning::Skipping Gitee upload for ${file_path} (${file_size} bytes): exceeds 100MiB Gitee per-file limit. Download this asset from the GitHub Release page."
              continue
            fi
            echo "Uploading: ${file_path} (${file_size} bytes)"
            resp_file=$(mktemp)
            http_code=$(curl -sS -o "${resp_file}" -w '%{http_code}' \
              --retry 3 --retry-delay 5 --connect-timeout 30 \
              -X POST \
              "https://gitee.com/api/v5/repos/${GITEE_REPO}/releases/${RELEASE_ID}/attach_files" \
              -H "Authorization: token ${GITEE_TOKEN}" \
              -F "file=@${file_path}")
            if [[ "${http_code}" != "200" && "${http_code}" != "201" ]]; then
              echo "::error::Failed to upload ${file_path} (HTTP ${http_code}): $(cat "${resp_file}")"
              rm -f "${resp_file}"
              exit 1
            fi
            rm -f "${resp_file}"
          done < <(find artifacts -type f -print0)
