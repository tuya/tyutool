name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Extract version + sync to branch ────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_beta: ${{ steps.v.outputs.is_beta }}
      file_label: ${{ steps.v.outputs.file_label }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: v
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
            echo "file_label=${VER}" >> "$GITHUB_OUTPUT"
          else
            VER="beta"
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          fi
          node scripts/bump-version.mjs "$VER"
          RESOLVED=$(jq -r .version package.json)
          echo "version=${RESOLVED}" >> "$GITHUB_OUTPUT"
          # For beta: file names use "version.beta" to distinguish from release
          if [[ "$VER" == "beta" ]]; then
            echo "file_label=${RESOLVED}.beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync version to branch
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to refactor/v3, apply version bump, push
          git stash
          git checkout "refactor/v3"
          node scripts/bump-version.mjs "$VERSION"

          if git diff --quiet; then
            echo "Version already up to date, skipping commit."
            exit 0
          fi

          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml \
                 crates/tyutool-core/Cargo.toml crates/tyutool-cli/Cargo.toml
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push origin "refactor/v3"

  # ── CLI (5 platforms) ────────────────────────────────────────────────────────
  # Pure Rust binary, musl static linking (Linux), no Tauri / Node dependency
  # Artifacts: tyutool-cli_{platform}_{arch}_{ver}.tar.gz / .zip
  build-cli:
    name: CLI · ${{ matrix.platform }}-${{ matrix.arch }}
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-musl,  platform: linux,   arch: x86_64,  use_cross: false }
          - { os: ubuntu-22.04,   target: aarch64-unknown-linux-musl, platform: linux,   arch: aarch64, use_cross: true  }
          - { os: macos-15-intel, target: x86_64-apple-darwin,        platform: macos,   arch: x86_64,  use_cross: false }
          - { os: macos-latest,   target: aarch64-apple-darwin,       platform: macos,   arch: aarch64, use_cross: false }
          - { os: windows-2022,   target: x86_64-pc-windows-msvc,     platform: windows, arch: x86_64,  use_cross: false }
    steps:
      - uses: actions/checkout@v6

      - name: Sync version
        run: node scripts/bump-version.mjs "${{ needs.prepare.outputs.version }}"

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "cli-${{ matrix.target }}" }

      - name: Install cross
        if: matrix.use_cross
        run: |
          CROSS_VERSION="v0.2.5"
          curl -fsSL "https://github.com/cross-rs/cross/releases/download/${CROSS_VERSION}/cross-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C "$HOME/.cargo/bin"
          cross --version

      - name: Install musl-tools
        if: runner.os == 'Linux' && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        env: { SERIALPORT_SKIP_LIBUDEV: "1" }
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release -p tyutool-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          V="${{ needs.prepare.outputs.file_label }}"
          mkdir -p dist
          tar -czf "dist/tyutool-cli_${{ matrix.platform }}_${{ matrix.arch }}_${V}.tar.gz" \
              -C "target/${{ matrix.target }}/release" tyutool_cli

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $V = "${{ needs.prepare.outputs.file_label }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/tyutool_cli.exe" `
            -DestinationPath "dist/tyutool-cli_${{ matrix.platform }}_${{ matrix.arch }}_${V}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: tyutool-cli_${{ matrix.platform }}_${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  # ── GUI (7 installers + 4 portables) ────────────────────────────────────────
  # Tauri 2 desktop app, each distribution type as a separate artifact
  # Binary name = tyutool_gui (set by src-tauri/Cargo.toml [package].name)
  # Artifacts: tyutool-gui_{platform}_{arch}_{type}_{ver}.ext
  build-gui:
    name: GUI · ${{ matrix.platform }}-${{ matrix.arch }} · ${{ matrix.install_type }}
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - { os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu,  platform: linux,   arch: x86_64,   bundles: deb,       install_type: deb,      with_portable: true  }
          - { os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu,  platform: linux,   arch: x86_64,   bundles: appimage,  install_type: appimage, with_portable: false }
          - { os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu,  platform: linux,   arch: x86_64,   bundles: rpm,       install_type: rpm,      with_portable: false }
          # Linux aarch64 (native ARM runner — no cross-compilation needed)
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, platform: linux,   arch: aarch64,  bundles: deb,       install_type: deb,      with_portable: true  }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, platform: linux,   arch: aarch64,  bundles: appimage,  install_type: appimage, with_portable: false }
          # macOS Universal Binary (single build covers Intel + Apple Silicon)
          # bundle_prefix: Tauri places universal artifacts under target/universal-apple-darwin/release/
          # tauri_args:    passed verbatim to `npx @tauri-apps/cli build`
          - { os: macos-latest, target: universal-apple-darwin, platform: macos, arch: universal, bundles: "dmg,app", install_type: dmg, with_portable: true, with_updater: true, bundle_prefix: "target/universal-apple-darwin/release", tauri_args: "--target universal-apple-darwin" }
          # Windows x86_64 — NSIS installer + portable (MSI removed; NSIS is simpler and matches sftool-gui)
          - { os: windows-2022,     target: x86_64-pc-windows-msvc,    platform: windows, arch: x86_64,   bundles: nsis,      install_type: nsis,     with_portable: true  }
    env:
      PREFIX: tyutool-gui_${{ matrix.platform }}_${{ matrix.arch }}
      VERSION: ${{ needs.prepare.outputs.file_label }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Sync version
        run: node scripts/bump-version.mjs "${{ needs.prepare.outputs.version }}"

      # ── System dependencies ──
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev libudev-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            xdg-utils

      # ── Toolchain ──
      - uses: pnpm/action-setup@v5
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
        with:
          # universal-apple-darwin is not a real Rust target; install both arches instead.
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: "gui-${{ matrix.target }}"
          shared-key: "gui-${{ matrix.target }}"
          save-if: ${{ matrix.install_type == 'deb' || matrix.platform != 'linux' }}

      # ── Frontend + Tauri build ──
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Build Tauri app
        shell: bash
        # tauri_args is set in the matrix (e.g. "--target universal-apple-darwin"); empty for other platforms.
        run: npx @tauri-apps/cli build --bundles "${{ matrix.bundles }}" ${{ matrix.tauri_args }} --ci

      # ── Installer: locate Tauri output and rename uniformly ──
      # Use release-pkg/ instead of dist/ to avoid collision with Vite build output.
      # bundle_prefix is set in the matrix for non-default layouts (e.g. universal-apple-darwin).
      - name: Package installer (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-pkg
          BUNDLE_BASE="${{ matrix.bundle_prefix || 'target/release' }}"
          BUNDLE_DIR="${BUNDLE_BASE}/bundle/${{ matrix.install_type }}"
          case "${{ matrix.install_type }}" in
            deb)      GLOB="*.deb" ;;
            rpm)      GLOB="*.rpm" ;;
            appimage) GLOB="*.AppImage" ;;
            dmg)      GLOB="*.dmg" ;;
            *)        GLOB="*" ;;
          esac
          SRC=$(find "$BUNDLE_DIR" -maxdepth 1 -name "$GLOB" -type f | head -1)
          EXT="${SRC##*.}"
          DEST="${PREFIX}_${{ matrix.install_type }}_${VERSION}.${EXT}"
          cp "$SRC" "release-pkg/${DEST}"
          # Copy .sig file if it exists (needed by generate-manifest.ts for GUI updater)
          SIG="${SRC}.sig"
          if [ -f "$SIG" ]; then
            cp "$SIG" "release-pkg/${DEST}.sig"
          fi

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-pkg | Out-Null
          $src = Get-ChildItem "target/release/bundle/${{ matrix.install_type }}" -File |
            Where-Object { $_.Extension -ne '.sig' } | Select-Object -First 1
          $dest = "${env:PREFIX}_${{ matrix.install_type }}_${env:VERSION}$($src.Extension)"
          Copy-Item $src.FullName "release-pkg/$dest"
          # Copy .sig file if it exists
          $sig = "$($src.FullName).sig"
          if (Test-Path $sig) {
            Copy-Item $sig "release-pkg/$dest.sig"
          }

      # ── Updater artifact (macOS .app.tar.gz + .sig) ──
      # Tauri updater on macOS uses .app.tar.gz (not .dmg).
      # For universal builds the tarball is under target/universal-apple-darwin/release/bundle/macos/.
      - name: Package updater artifact (macOS)
        if: matrix.with_updater && runner.os == 'macOS'
        run: |
          mkdir -p release-pkg
          BUNDLE_BASE="${{ matrix.bundle_prefix || 'target/release' }}"
          UPDATER_DIR="${BUNDLE_BASE}/bundle/macos"
          UPDATER_SRC=$(find "$UPDATER_DIR" -maxdepth 1 -name "*.app.tar.gz" -type f | head -1)
          if [ -n "$UPDATER_SRC" ]; then
            UPDATER_DEST="${PREFIX}_update_${VERSION}.app.tar.gz"
            cp "$UPDATER_SRC" "release-pkg/${UPDATER_DEST}"
            UPDATER_SIG="${UPDATER_SRC}.sig"
            if [ -f "$UPDATER_SIG" ]; then
              cp "$UPDATER_SIG" "release-pkg/${UPDATER_DEST}.sig"
            fi
          fi

      # Also upload the .sig file alongside the installer so generate-manifest.ts
      # can read the signature for the Tauri updater platforms field.
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PREFIX }}_${{ matrix.install_type }}
          path: release-pkg/
          if-no-files-found: error

      # ── Portable ──
      # Binary name is determined by src-tauri/Cargo.toml [package].name = tyutool_gui
      - name: Package portable (Unix)
        if: matrix.with_portable && runner.os != 'Windows'
        run: |
          mkdir -p release-portable
          BUNDLE_BASE="${{ matrix.bundle_prefix || 'target/release' }}"
          tar -czf "release-portable/${PREFIX}_portable_${VERSION}.tar.gz" \
              -C "${BUNDLE_BASE}" tyutool_gui

      - name: Package portable (Windows)
        if: matrix.with_portable && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-portable | Out-Null
          Compress-Archive -Path "target/release/tyutool_gui.exe" `
            -DestinationPath "release-portable/${env:PREFIX}_portable_${env:VERSION}.zip"

      - uses: actions/upload-artifact@v7
        if: matrix.with_portable
        with:
          name: ${{ env.PREFIX }}_portable
          path: release-portable/
          if-no-files-found: error

  # ── GitHub Release (tag trigger only) ───────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [prepare, build-cli, build-gui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with: { path: artifacts/ }

      - run: find artifacts/ -type f | sort

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f -exec cp {} release-assets/ \;
          echo "── Release assets ──────────────────────────────"
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: tyutool ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: release-assets/*

  # ── Generate latest.json update manifest ────────────────────────────────────
  generate-manifest:
    name: Generate latest.json
    needs: [prepare, create-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with: { path: artifacts/ }

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: pnpm exec tsx scripts/generate-manifest.ts

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json

  # ── Sync to Gitee (non-blocking) ────────────────────────────────────────────
  # Requires repo secrets: GITEE_TOKEN, GITEE_USER (namespace), GITEE_REPO (path or owner/repo).
  # Optional repo variable: GITEE_TARGET_COMMITISH. Script: scripts/sync-gitee-release.sh
  sync-gitee:
    name: Sync to Gitee
    needs: [generate-manifest, prepare]
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - id: gate
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [[ -z "${GITEE_TOKEN}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::GITEE_TOKEN not set — skipping Gitee sync."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v8
        if: steps.gate.outputs.skip != 'true'
        with: { path: artifacts/ }

      - name: Install Gitee sync dependencies
        if: steps.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl python3 ca-certificates

      - uses: pnpm/action-setup@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          version: 10

      - uses: actions/setup-node@v6
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Gitee latest.json
        if: steps.gate.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -euo pipefail
          if [[ "${GITEE_REPO}" == */* ]]; then
            GO="${GITEE_REPO%%/*}"
            GR="${GITEE_REPO#*/}"
          else
            GO="${GITEE_USER}"
            GR="${GITEE_REPO}"
          fi
          if [[ -z "${GO}" || -z "${GR}" ]]; then
            echo "::error::Invalid Gitee coordinates: use GITEE_USER + repo-only GITEE_REPO, or set GITEE_REPO to owner/repo."
            exit 1
          fi
          export MANIFEST_BASE_URL="https://gitee.com/${GO}/${GR}/releases/download/${TAG}"
          pnpm exec tsx scripts/generate-manifest.ts

      - name: Flatten assets for Gitee upload
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p gitee-assets
          declare -A seen
          while IFS= read -r -d '' fpath; do
            fname="$(basename "$fpath")"
            if [[ -n "${seen[$fname]:-}" ]]; then
              echo "::error::Duplicate release asset name '${fname}' from '${seen[$fname]}' and '${fpath}'."
              exit 1
            fi
            seen[$fname]="$fpath"
            cp "$fpath" "gitee-assets/$fname"
          done < <(find artifacts/ -type f -print0)
          cp -f latest.json gitee-assets/
          ls -lh gitee-assets/

      - name: Sync release to Gitee
        if: steps.gate.outputs.skip != 'true'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          TAG: ${{ github.ref_name }}
          GITEE_ASSETS_DIR: ${{ github.workspace }}/gitee-assets
          GITEE_TARGET_COMMITISH: ${{ vars.GITEE_TARGET_COMMITISH }}
        run: bash scripts/sync-gitee-release.sh
