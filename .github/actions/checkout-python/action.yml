# Composite: clone ref + Python toolchain (shared by validate / build jobs)
name: Checkout and setup Python
description: Checkout repository at a ref and install the requested Python version
inputs:
  checkout-ref:
    description: Git ref (branch, tag, or SHA)
    required: true
  python-version:
    description: Python version for actions/setup-python
    required: true
  fetch-depth:
    description: History depth (0 = full clone)
    required: false
    default: '1'
runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.checkout-ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
